[theme]
# 自定义主题配色（暗色主题，适合汽车驾驶舱风格）
primaryColor = "#FF4B4B"
backgroundColor = "#0E1117"
secondaryBackgroundColor = "#262730"
textColor = "#FAFAFA"
font = "sans serif"

[server]
# 服务器配置
port = 8501
enableCORS = false
enableXsrfProtection = true
maxUploadSize = 200

[browser]
# 浏览器配置
gatherUsageStats = false
serverAddress = "localhost"
serverPort = 8501

[runner]
# 运行器配置
magicEnabled = true
fastReruns = true
